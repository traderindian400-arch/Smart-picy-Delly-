<style>
  :root{
    --ink:#0E1626;
    --ink-soft:#3A4658;
    --paper:#EDEFF3;
    --paper-raised:#FFFFFF;
    --line:#D7DCE5;
    --blueprint:#1D4E89;
    --blueprint-soft:#E7EEF7;
    --copper:#C97A3D;
    --copper-hot:#E08F4F;
    --mint:#2FA98C;
    --shadow: 0 1px 2px rgba(14,22,38,.04), 0 8px 24px rgba(14,22,38,.06);
    --shadow-lg: 0 20px 50px rgba(14,22,38,.14);
    --radius: 14px;
    --maxw: 1180px;
  }
  [data-theme="dark"]{
    --ink:#EDEFF3;
    --ink-soft:#AEB8C9;
    --paper:#0B1220;
    --paper-raised:#111B2E;
    --line:#22304A;
    --blueprint:#5B9CDD;
    --blueprint-soft:#132340;
    --copper:#E08F4F;
    --copper-hot:#F2A560;
    --mint:#4FCBAA;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 20px 60px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:16px;
    line-height:1.6;
    transition:background .3s ease, color .3s ease;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:-0.02em; color:var(--ink);}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  img{max-width:100%; display:block;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; color:var(--blueprint);
    padding:6px 12px; border:1px solid var(--line); border-radius:100px;
    background:var(--blueprint-soft);
  }
  .eyebrow::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--copper); flex:none;}

  /* Page routing */
  [data-page] { display: none; }
  [data-page].active { display: block; }

  /* Blueprint grid background */
  .grid-bg{
    position:absolute; inset:0; pointer-events:none;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity:.35;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 40%, transparent 90%);
  }

  /* corner bracket frame */
  .bracket{ position:relative; }
  .bracket::before, .bracket::after{
    content:''; position:absolute; width:14px; height:14px;
    border:2px solid var(--blueprint); opacity:.55;
  }
  .bracket::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .bracket::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  header{
    position:sticky; top:0; z-index:100;
    background:color-mix(in srgb, var(--paper) 82%, transparent);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--line);
  }
  nav{display:flex; align-items:center; justify-content:space-between; padding:16px 24px;}
  .logo{display:flex; align-items:center; gap:9px; font-family:'Space Grotesk'; font-weight:700; font-size:20px; cursor:pointer;}
  .logo .mark{
    width:30px; height:30px; border-radius:7px;
    background:linear-gradient(135deg, var(--blueprint), var(--mint));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:15px; font-weight:800; flex:none;
  }
  .nav-links{display:flex; align-items:center; gap:30px;}
  .nav-links a{font-size:14.5px; font-weight:600; color:var(--ink-soft); transition:color .2s; cursor:pointer;}
  .nav-links a:hover{color:var(--blueprint);}
  .nav-actions{display:flex; align-items:center; gap:12px;}
  .theme-toggle{
    width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--paper-raised); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; transition:transform .2s, border-color .2s;
  }
  .theme-toggle:hover{border-color:var(--blueprint); transform:translateY(-1px);}
  .cart-badge{
    position:absolute; top:-6px; right:-6px; background:var(--copper); color:#fff;
    font-size:11px; font-weight:700; width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-icon{
    width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--paper-raised); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; transition:transform .2s; position:relative;
  }
  .nav-icon:hover{transform:translateY(-1px);}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 22px; border-radius:10px; font-weight:700; font-size:14.5px;
    cursor:pointer; border:none; transition:transform .18s ease, box-shadow .18s ease, background .2s;
    white-space:nowrap;
  }
  .btn-primary{background:linear-gradient(135deg, var(--copper), var(--copper-hot)); color:#fff; box-shadow:0 8px 20px rgba(201,122,61,.35);}
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 28px rgba(201,122,61,.45);}
  .btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--blueprint); color:var(--blueprint);}
  .btn-dark{background:var(--ink); color:var(--paper);}
  .btn-dark:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg);}
  .btn-sm{padding:9px 16px; font-size:13px;}
  .hamburger{display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:6px;}
  .hamburger span{width:22px; height:2px; background:var(--ink); display:block;}

  /* ---------- SEARCH BAR ---------- */
  .search-container{
    position:relative; width:100%; max-width:500px; margin:20px auto;
  }
  .search-bar{
    width:100%; padding:14px 18px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); color:var(--ink); font-size:14.5px;
    transition:border-color .2s, box-shadow .2s;
  }
  .search-bar:focus{outline:none; border-color:var(--blueprint); box-shadow:0 0 0 3px var(--blueprint-soft);}
  .search-dropdown{
    position:absolute; top:100%; left:0; right:0; background:var(--paper-raised);
    border:1px solid var(--line); border-top:none; border-radius:0 0 var(--radius) var(--radius);
    max-height:400px; overflow-y:auto; z-index:50; display:none;
  }
  .search-dropdown.active{display:block;}
  .search-result{
    padding:12px 18px; border-bottom:1px solid var(--line); cursor:pointer;
    transition:background .2s;
  }
  .search-result:hover{background:var(--blueprint-soft);}

  /* ---------- FILTERS & MARKETPLACE ---------- */
  .filter-panel{flex:0 0 220px; background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:20px; position:sticky; top:80px; max-height:calc(100vh - 100px); overflow-y:auto;}
  .filter-group{margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--line);}
  .filter-group:last-child{border-bottom:none; margin-bottom:0; padding-bottom:0;}
  .filter-group h5{font-size:13px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; color:var(--ink-soft);}
  .filter-option{display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer;}
  .filter-option input{cursor:pointer;}
  .filter-option label{cursor:pointer; flex:1;}
  .marketplace-container{display:flex; gap:24px; max-width:var(--maxw); margin:0 auto; align-items:flex-start;}
  .products-area{flex:1;}

  /* ---------- HERO ---------- */
  .hero{position:relative; padding:96px 24px 80px; overflow:hidden;}
  .hero-inner{max-width:var(--maxw); margin:0 auto; position:relative; z-index:2; text-align:center;}
  .hero h1{font-size:clamp(38px, 6vw, 68px); line-height:1.05; margin:22px 0 20px; max-width:920px; margin-left:auto; margin-right:auto;}
  .hero h1 .accent{color:var(--copper);}
  .hero p.lead{font-size:18px; color:var(--ink-soft); max-width:600px; margin:0 auto 34px;}
  .hero-ctas{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:56px;}
  .hero-stats{
    display:grid; grid-template-columns:repeat(4,1fr); gap:0;
    max-width:820px; margin:0 auto; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--paper-raised); box-shadow:var(--shadow); overflow:hidden;
  }
  .stat{padding:22px 12px; text-align:center; border-right:1px solid var(--line);}
  .stat:last-child{border-right:none;}
  .stat b{display:block; font-family:'Space Grotesk'; font-size:26px; color:var(--blueprint);}
  .stat span{font-size:12px; color:var(--ink-soft); font-family:'JetBrains Mono'; text-transform:uppercase; letter-spacing:.05em;}

  .trustbar{padding:36px 24px; border-top:1px solid var(--line); border-bottom:1px solid var(--line);}
  .trustbar .wrap{display:flex; align-items:center; justify-content:center; gap:44px; flex-wrap:wrap; opacity:.65;}
  .trustbar span{font-family:'Space Grotesk'; font-weight:700; font-size:16px; letter-spacing:.02em; color:var(--ink-soft);}

  /* ---------- SECTION shell ---------- */
  section{padding:96px 24px;}
  .section-head{max-width:640px; margin:0 auto 52px; text-align:center;}
  .section-head h2{font-size:clamp(28px,4vw,40px); margin:16px 0 12px;}
  .section-head p{color:var(--ink-soft); font-size:16.5px;}

  .reveal{opacity:0; transform:translateY(24px); transition:opacity .6s ease, transform .6s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}

  /* ---------- BENEFITS ---------- */
  .benefits-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:20px; max-width:var(--maxw); margin:0 auto;}
  .benefit-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:26px 22px; position:relative; transition:transform .25s, box-shadow .25s, border-color .25s;
  }
  .benefit-card:hover{transform:translateY(-5px); box-shadow:var(--shadow-lg); border-color:var(--blueprint);}
  .benefit-card .tag{font-family:'JetBrains Mono'; font-size:11px; color:var(--copper); font-weight:600; letter-spacing:.08em;}
  .benefit-icon{
    width:44px; height:44px; border-radius:10px; background:var(--blueprint-soft); color:var(--blueprint);
    display:flex; align-items:center; justify-content:center; margin:14px 0 16px; font-size:20px;
  }
  .benefit-card h3{font-size:17.5px; margin-bottom:8px;}
  .benefit-card p{font-size:14.5px; color:var(--ink-soft);}

  /* ---------- CATEGORIES ---------- */
  .cat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; max-width:var(--maxw); margin:0 auto;}
  .cat-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; display:flex; flex-direction:column; gap:10px; cursor:pointer;
    transition:transform .22s, border-color .22s, box-shadow .22s;
  }
  .cat-card:hover{transform:translateY(-4px); border-color:var(--mint); box-shadow:var(--shadow-lg);}
  .cat-emoji{font-size:26px;}
  .cat-card h4{font-size:15.5px;}
  .cat-card span{font-size:12.5px; color:var(--ink-soft); font-family:'JetBrains Mono';}

  /* ---------- PRODUCTS ---------- */
  .prod-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:22px; max-width:var(--maxw); margin:0 auto;}
  .prod-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; transition:transform .25s, box-shadow .25s; display:flex; flex-direction:column;
  }
  .prod-card:hover{transform:translateY(-6px); box-shadow:var(--shadow-lg);}
  .prod-thumb{
    height:140px; position:relative; display:flex; align-items:center; justify-content:center; font-size:34px;
  }
  .prod-thumb .badge{
    position:absolute; top:10px; left:10px; background:var(--copper); color:#fff; font-size:10.5px;
    font-family:'JetBrains Mono'; font-weight:700; padding:4px 9px; border-radius:100px; letter-spacing:.04em;
  }
  .prod-body{padding:18px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .prod-cat{font-family:'JetBrains Mono'; font-size:11px; color:var(--blueprint); text-transform:uppercase; letter-spacing:.06em;}
  .prod-body h4{font-size:16px; line-height:1.3;}
  .stars{color:var(--copper); font-size:13px; letter-spacing:2px;}
  .stars span{color:var(--ink-soft); font-family:'Inter'; letter-spacing:0; font-size:12.5px; margin-left:4px;}
  .prod-foot{display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px; flex-wrap:wrap; gap:8px;}
  .price{font-family:'Space Grotesk'; font-weight:700; font-size:19px;}
  .price small{font-family:'Inter'; font-weight:400; font-size:13px; color:var(--ink-soft); text-decoration:line-through; margin-right:6px;}
  .wishlist-btn{width:38px; height:38px; border:1px solid var(--line); background:var(--paper-raised); border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; font-size:16px;}
  .wishlist-btn:hover{border-color:var(--copper); background:var(--copper);}
  .wishlist-btn.liked{color:var(--copper);}

  /* ---------- PRODUCT DETAIL MODAL ---------- */
  .modal{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center;
    z-index:1000; padding:20px; overflow-y:auto;
  }
  .modal.active{display:flex;}
  .modal-content{
    background:var(--paper-raised); border-radius:var(--radius); padding:40px; max-width:700px; width:100%;
    max-height:90vh; overflow-y:auto; position:relative;
  }
  .modal-close{
    position:absolute; top:16px; right:16px; background:none; border:none; cursor:pointer;
    font-size:24px; color:var(--ink-soft); transition:color .2s;
  }
  .modal-close:hover{color:var(--ink);}
  .comparison-table{width:100%; border-collapse:collapse; margin:20px 0;}
  .comparison-table th, .comparison-table td{padding:12px; border:1px solid var(--line); text-align:left;}
  .comparison-table th{background:var(--blueprint-soft); font-weight:700;}

  /* ---------- CART SIDEBAR ---------- */
  .cart-sidebar{
    position:fixed; top:0; right:-400px; width:400px; height:100vh; background:var(--paper-raised);
    border-left:1px solid var(--line); transition:right .3s ease; z-index:999; overflow-y:auto;
    display:flex; flex-direction:column;
  }
  .cart-sidebar.open{right:0;}
  .cart-header{padding:20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .cart-header h3{font-size:16px;}
  .cart-header button{background:none; border:none; cursor:pointer; font-size:20px;}
  .cart-items{flex:1; overflow-y:auto; padding:20px;}
  .cart-item{padding:16px; background:var(--paper); border-radius:10px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;}
  .cart-item-info{flex:1;}
  .cart-item-info h5{font-size:13px; margin-bottom:4px;}
  .cart-item-info span{font-size:12px; color:var(--ink-soft);}
  .cart-item-price{font-weight:700; margin:0 12px;}
  .cart-item-remove{background:none; border:none; cursor:pointer; color:var(--copper); font-size:16px;}
  .cart-footer{padding:20px; border-top:1px solid var(--line);}
  .cart-total{display:flex; justify-content:space-between; margin-bottom:16px; font-weight:700; font-size:16px;}
  .empty-cart{text-align:center; padding:40px 20px; color:var(--ink-soft);}

  /* ---------- TESTIMONIALS ---------- */
  .test-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:var(--maxw); margin:0 auto;}
  .test-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:26px; display:flex; flex-direction:column; gap:16px;
  }
  .test-card p{font-size:15px; color:var(--ink);}
  .test-card .rating{color:var(--copper); font-size:12px; margin-bottom:8px;}
  .test-who{display:flex; align-items:center; gap:12px; margin-top:auto;}
  .avatar{
    width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--blueprint),var(--mint));
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; flex:none;
  }
  .verified-badge{font-size:11px; color:var(--mint); font-weight:700; margin-left:auto;}
  .test-who b{font-size:14px; display:block;}
  .test-who span{font-size:12.5px; color:var(--ink-soft);}

  .success-strip{
    max-width:var(--maxw); margin:44px auto 0; padding:28px; border-radius:var(--radius);
    background:linear-gradient(120deg, var(--blueprint-soft), transparent); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-around; flex-wrap:wrap; gap:24px; text-align:center;
  }
  .success-strip div b{display:block; font-family:'Space Grotesk'; font-size:24px; color:var(--mint);}
  .success-strip div span{font-size:12.5px; color:var(--ink-soft); font-family:'JetBrains Mono';}

  <!-- ================= BLOG ================= -->
  <section id="blog" style="background:var(--paper-raised); border-top:1px solid var(--line); border-bottom:1px solid var(--line);">
    <div class="section-head reveal">
      <span class="eyebrow">From the Blog</span>
      <h2>Guides for growing your business online</h2>
      <p>Practical, SEO-researched playbooks — no recycled listicles.</p>
    </div>
    <div class="blog-grid">
      <article class="blog-card reveal">
        <div class="blog-thumb" style="background:linear-gradient(135deg,#1D4E89,#2FA98C);">📈</div>

          <a href="#" class="read-more">Read the guide →</a>
        </div>
      </article>

        <div class="blog-thumb" style="background:linear-gradient(135deg,#C97A3D,#E08F4F);">🤖</div>

          <a href="#" class="read-more">Read the guide →</a>
        </div>
      </article>

        <div class="blog-thumb" style="background:linear-gradient(135deg,#3A4658,#1D4E89);">💼</div>

          <a href="#" class="read-more">Read the guide →</a>
        </div>
      </article>
    </div>
  </section>

  <!-- ================= NEWSLETTER ================= -->
  <section>
    <div class="newsletter reveal">
      <span class="eyebrow" style="background:transparent; border-color:#33415A; color:#9FC1E6;">Weekly Digest</span>
      <h2>Get one useful growth tactic every Tuesday</h2>

    showPage(page) {
      document.querySelectorAll('[data-page]').forEach(el => el.classList.remove('active'));
      const target = document.querySelector(`[data-page="${page}"]`);
      if (target) target.classList.add('active');
      this.currentPage = page;
      
      if (page === 'marketplace') {
        setTimeout(() => this.renderProducts(this.allProducts), 100);
      }
      
      window.scrollTo(0, 0);
    },

    renderProducts(products) {
      const grid = document.getElementById('marketplaceProducts') || document.getElementById('featuredProducts');
      if (!grid) return;
      
      grid.innerHTML = products.slice(0, this.currentPage === 'home' ? 4 : products.length).map(p => `
        <div class="prod-card reveal">
          <div class="prod-thumb" style="background:${p.bg};">${p.badge ? `<span class="badge">${p.badge}</span>` : ''}${p.emoji}</div>
          <div class="prod-body">
            <span class="prod-cat">${p.category.toUpperCase()}</span>
            <h4>${p.name}</h4>
            <div class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5-Math.floor(p.rating))}<span>${p.rating} (${p.reviews})</span></div>
            <div class="prod-foot">
              <div class="price">${p.original ? `<small>$${p.original}</small>` : ''}$${p.price}</div>
              <div style="display:flex; gap:6px;">
                <button class="wishlist-btn" onclick="app.addToWishlist(${p.id}); event.stopPropagation();" title="Add to wishlist">♥</button>
                <button class="btn btn-dark btn-sm" onclick="app.addToCart(${p.id}); app.viewProduct(${p.id})">Buy</button>
                <button class="btn btn-ghost btn-sm" onclick="app.compareProduct(${p.id})">Compare</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    },

    addToCart(id) {
      const product = this.allProducts.find(p => p.id === id);
      if (!product) return;
      
      this.cart.push({ ...product, quantity: 1 });
      this.updateCart();
    },

    updateCart() {
      const cartItems = document.getElementById('cartItems');
      const cartBadge = document.getElementById('cartBadge');
      
      if (this.cart.length === 0) {
        cartItems.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
        cartBadge.style.display = 'none';
      } else {
        cartItems.innerHTML = this.cart.map((item, i) => `
          <div class="cart-item">
            <div class="cart-item-info">
              <h5>${item.name}</h5>
              <span>$${item.price}</span>
            </div>
            <button class="cart-item-remove" onclick="app.cart.splice(${i}, 1); app.updateCart()">✕</button>
          </div>
        `).join('');
        cartBadge.textContent = this.cart.length;
        cartBadge.style.display = 'flex';
      }
      
      const total = this.cart.reduce((sum, item) => sum + item.price, 0);
      document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
      if (document.getElementById('checkoutTotal')) {
        document.getElementById('checkoutTotal').textContent = `$${total.toFixed(2)}`;
      }
    },

    addToWishlist(id) {
      const product = this.allProducts.find(p => p.id === id);
      if (!product) return;
      
      const index = this.wishlist.findIndex(p => p.id === id);
      if (index >= 0) {
        this.wishlist.splice(index, 1);
      } else {
        this.wishlist.push(product);
      }
      
      this.updateWishlistBadge();
    },
